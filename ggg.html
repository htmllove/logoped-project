<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Буфер обмена</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#111823;
      --panel-2:#0f1620;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --line:#1f2937;
      --accent:#ffffff;
      --accent-2:#60a5fa;
      --danger:#ef4444;
      --shadow:0 12px 40px rgba(0,0,0,.35);
      --radius:18px;
      --max:860px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    body{
      min-height:100dvh;
      display:flex;
      justify-content:center;
    }
    .app{
      width:100%;
      max-width:var(--max);
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:8px 4px;
    }
    .brand h1{
      margin:0;
      font-size:18px;
      line-height:1.2;
      letter-spacing:-.03em;
    }
    .brand p{
      margin:3px 0 0;
      font-size:13px;
      color:var(--muted);
    }
    .card{
      background:linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .editor{
      width:100%;
      min-height:42vh;
      border:0;
      outline:none;
      resize:vertical;
      padding:18px;
      background:transparent;
      color:var(--text);
      font-size:16px;
      line-height:1.6;
      caret-color:var(--accent-2);
    }
    .editor::placeholder{color:#64748b}
    .preview{
      display:none;
      padding:18px;
      border-top:1px solid var(--line);
      white-space:pre-wrap;
      word-break:break-word;
      line-height:1.65;
      font-size:16px;
      background:#0b1220;
    }
    .preview code{
      background:#172033;
      padding:2px 6px;
      border-radius:6px;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }
    .actions,.section-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      padding:0 4px;
    }
    .btn{
      appearance:none;
      border:1px solid var(--line);
      border-radius:999px;
      padding:12px 16px;
      font-size:14px;
      font-weight:600;
      line-height:1;
      cursor:pointer;
      background:#101722;
      color:var(--text);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .btn-primary{
      background:var(--accent);
      color:#0b0f14;
      border-color:transparent;
    }
    .btn-danger{
      background:#3b1114;
      color:#fecaca;
      border-color:#522026;
    }
    .btn:active{transform:scale(.98)}
    .status{
      min-height:18px;
      padding:0 4px;
      font-size:13px;
      color:var(--muted);
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      padding:12px;
    }
    .block-title{
      padding:14px 16px 0;
      font-size:14px;
      font-weight:700;
      color:#cbd5e1;
      letter-spacing:-.01em;
    }
    .hint{padding:0 4px;font-size:12px;color:#64748b}
    .photo-card{
      background:#0b1220;
      border:1px solid #1f2937;
      border-radius:16px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .photo-card img{
      width:100%;
      aspect-ratio:1/1;
      object-fit:cover;
      display:block;
      background:#0a0a0a;
    }
    .photo-meta{
      padding:10px 10px 0;
      font-size:12px;
      color:var(--muted);
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .photo-actions{
      display:flex;
      gap:8px;
      padding:10px;
    }
    .photo-actions a,.photo-actions button{
      flex:1;
      text-align:center;
      border:0;
      border-radius:999px;
      padding:10px 12px;
      font-size:13px;
      font-weight:600;
      text-decoration:none;
      cursor:pointer;
      background:#1f2937;
      color:#e5e7eb;
    }
    .photo-actions .danger{background:#7f1d1d;color:#fee2e2}
    .hidden{display:none}
    @media (min-width:768px){
      .app{padding:24px}
      .editor{min-height:54vh;font-size:17px}
      .brand h1{font-size:20px}
      .grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="brand">
        <h1>Буфер обмена</h1>
        <p>ver. 0.1.1</p>
      </div>
      <button class="btn" id="copyLinkBtn" type="button">Ссылка</button>
    </div>

    <section class="card">
      <textarea id="editor" class="editor" placeholder="Вставьте текст сюда..."></textarea>
      <div class="preview hidden" id="preview"></div>
    </section>

    <div class="actions">
      <button class="btn btn-primary" id="saveBtn" type="button">Сохранить</button>
      <button class="btn" id="toggleBtn" type="button">Просмотр</button>
      <button class="btn" id="clearBtn" type="button">Очистить</button>
    </div>

    <div class="status" id="status">Готово.</div>

    <section class="card">
      <div class="block-title">Фото</div>
      <div class="section-actions" style="padding:12px 12px 0;">
        <input id="photoInput" type="file" accept="image/*" multiple class="hidden" />
        <label for="photoInput" class="btn">Выбрать фото</label>
        <button class="btn btn-primary" id="savePhotosBtn" type="button">Сохранить фото</button>
      </div>
      <div class="hint" style="padding:10px 12px 0;">Файлы сжимаются в браузере и сохраняются как base64 в Realtime Database.</div>

      <div class="block-title" style="padding-top:16px;">Перед сохранением</div>
      <div class="grid" id="selectedPhotos"></div>

      <div class="block-title" style="padding-top:16px;">Сохраненные</div>
      <div class="grid" id="savedPhotos"></div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getDatabase, ref as dbRef, set, get, onValue, push, remove, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD9mzEmeC84ZzGyFjgfAAeipk7hNBBJOcE", // Это значение нужно получить из консоли Firebase.
      authDomain: "clipboard-cd9f9.firebaseapp.com",
      databaseURL: "https://clipboard-cd9f9-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "clipboard-cd9f9",
      storageBucket: "clipboard-cd9f9.appspot.com",
      messagingSenderId: "151751834553",
      appId: "1:151751834553:web:abcd1b0c8b148a212a5468" // Это значение нужно получить из консоли Firebase.
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const params = new URLSearchParams(location.search);
    const docId = params.get('id') || 'main';

    const docRef = dbRef(db, `clipboard/${docId}`);
    const photosRef = dbRef(db, `clipboard/${docId}/photos`);

    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const statusEl = document.getElementById('status');
    const saveBtn = document.getElementById('saveBtn');
    const toggleBtn = document.getElementById('toggleBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyLinkBtn = document.getElementById('copyLinkBtn');
    const photoInput = document.getElementById('photoInput');
    const savePhotosBtn = document.getElementById('savePhotosBtn');
    const selectedPhotos = document.getElementById('selectedPhotos');
    const savedPhotos = document.getElementById('savedPhotos');

    let viewMode = false;
    let saveTimer = null;
    let suppressRemote = false;
    let selectedItems = [];

    function setStatus(msg){ statusEl.textContent = msg; }

    function escapeHtml(str){
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function renderText(text){
      return escapeHtml(text).replace(/\n/g,'<br>').replace(/`([^`]+)`/g,'<code>$1</code>');
    }

    function syncPreview(){ preview.innerHTML = renderText(editor.value); }

    async function saveDoc(){
      suppressRemote = true;
      await update(docRef, {
        text: editor.value,
        updatedAt: serverTimestamp()
      });
      localStorage.setItem(`clipboard:${docId}`, editor.value);
      setStatus('Автосохранено.');
      setTimeout(() => suppressRemote = false, 300);
    }

    async function loadDoc(){
      const snap = await get(docRef);
      if (snap.exists()) {
        const data = snap.val();
        if (typeof data.text === 'string') {
          editor.value = data.text;
          localStorage.setItem(`clipboard:${docId}`, data.text);
          syncPreview();
          setStatus('Загружено из Firebase.');
          return;
        }
      }
      const draft = localStorage.getItem(`clipboard:${docId}`);
      if (draft !== null) {
        editor.value = draft;
        syncPreview();
        setStatus('Загружено из локального черновика.');
      } else {
        setStatus('Документ пуст.');
      }
    }

    onValue(docRef, (snap) => {
      const data = snap.val();
      if (!data || typeof data.text !== 'string') return;
      if (suppressRemote) return;
      if (data.text !== editor.value) {
        editor.value = data.text;
        localStorage.setItem(`clipboard:${docId}`, data.text);
        syncPreview();
        setStatus('Обновлено в реальном времени.');
      }
    });

    editor.addEventListener('input', () => {
      syncPreview();
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveDoc, 450);
      setStatus('Ввод...');
    });

    saveBtn.addEventListener('click', saveDoc);

    toggleBtn.addEventListener('click', () => {
      viewMode = !viewMode;
      editor.classList.toggle('hidden', viewMode);
      preview.classList.toggle('hidden', !viewMode);
      toggleBtn.textContent = viewMode ? 'Редактировать' : 'Просмотр';
      if (viewMode) syncPreview();
    });

    clearBtn.addEventListener('click', async () => {
      editor.value = '';
      syncPreview();
      await saveDoc();
    });

    copyLinkBtn.addEventListener('click', async () => {
      const url = `${location.origin}${location.pathname}?id=${docId}`;
      await navigator.clipboard.writeText(url);
      setStatus('Ссылка скопирована.');
    });

    function fileToDataUrl(file){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function compressDataUrl(src, maxWidth = 1200, quality = 0.72){
      const img = new Image();
      img.src = src;
      await img.decode();

      const canvas = document.createElement('canvas');
      const ratio = Math.min(1, maxWidth / img.width);
      canvas.width = Math.round(img.width * ratio);
      canvas.height = Math.round(img.height * ratio);

      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL('image/jpeg', quality);
    }

    async function fileToCompressedItem(file){
      const original = await fileToDataUrl(file);
      const compressed = await compressDataUrl(original, 1200, 0.72);
      return {
        name: file.name,
        size: file.size,
        dataUrl: compressed,
        preview: compressed
      };
    }

    function renderSelected(){
      selectedPhotos.innerHTML = selectedItems.map((item, index) => `
        <div class="photo-card">
          <img src="${item.preview}" alt="">
          <div class="photo-meta">${escapeHtml(item.name)} · ${Math.round(item.size/1024)} KB</div>
          <div class="photo-actions">
            <button type="button" class="danger" data-remove="${index}">Удалить</button>
          </div>
        </div>
      `).join('');
    }

    photoInput.addEventListener('change', async () => {
      const files = Array.from(photoInput.files || []);
      selectedItems = [];
      for (const file of files) selectedItems.push(await fileToCompressedItem(file));
      renderSelected();
    });

    selectedPhotos.addEventListener('click', (e) => {
      const idx = e.target?.dataset?.remove;
      if (idx === undefined) return;
      selectedItems.splice(Number(idx), 1);
      photoInput.value = '';
      renderSelected();
    });

    savePhotosBtn.addEventListener('click', async () => {
      if (!selectedItems.length) {
        setStatus('Фото не выбраны.');
        return;
      }
      setStatus('Сохранение фото...');
      for (const item of selectedItems) {
        const keyRef = push(photosRef);
        await set(keyRef, {
          name: item.name,
          dataUrl: item.dataUrl,
          mime: 'image/jpeg',
          createdAt: serverTimestamp()
        });
      }
      selectedItems = [];
      photoInput.value = '';
      selectedPhotos.innerHTML = '';
      setStatus('Фото сохранены.');
    });

    onValue(photosRef, (snap) => {
      const data = snap.val() || {};
      const items = Object.entries(data).map(([key, item]) => ({ key, ...item }));
      items.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));

      savedPhotos.innerHTML = items.map(item => `
        <div class="photo-card">
          <img src="${item.dataUrl}" alt="">
          <div class="photo-meta">${escapeHtml(item.name || 'photo')}</div>
          <div class="photo-actions">
            <a href="${item.dataUrl}" download="${escapeHtml(item.name || 'photo.jpg')}">Скачать</a>
            <button type="button" class="danger" data-delete="${item.key}">Удалить</button>
          </div>
        </div>
      `).join('');
    });

    savedPhotos.addEventListener('click', async (e) => {
      const key = e.target?.dataset?.delete;
      if (!key) return;
      await remove(dbRef(db, `clipboard/${docId}/photos/${key}`));
      setStatus('Фото удалено.');
    });

    loadDoc();
    syncPreview();
  </script>
</body>
</html>
